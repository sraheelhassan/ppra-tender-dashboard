name: Daily PPRA Tender Scrape

on:
  schedule:
    # 06:00 PKT = 01:00 UTC, every day
    - cron: "0 1 * * *"
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push if data changed
        run: |
          git config user.name "ppra-bot"
          git config user.email "actions@github.com"
          git add data/tenders.csv
          if ! git diff --cached --quiet; then
            git commit -m "Daily tender refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes — tenders are already up to date."
          fi
